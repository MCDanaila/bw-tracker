<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <style>
    .monochrome { stroke: #18181B; }
    @media (prefers-color-scheme: dark) {
      .monochrome { stroke: #F4F4F5; }
    }
  </style>

  <!-- Barbell Top Plates -->
  <line x1="44" y1="120" x2="124" y2="120" class="monochrome" stroke-width="24" stroke-linecap="round"/>
  <line x1="54" y1="80" x2="114" y2="80" class="monochrome" stroke-width="24" stroke-linecap="round"/>

  <!-- Barbell Bottom Plates -->
  <line x1="44" y1="392" x2="124" y2="392" class="monochrome" stroke-width="24" stroke-linecap="round"/>
  <line x1="54" y1="432" x2="114" y2="432" class="monochrome" stroke-width="24" stroke-linecap="round"/>

  <!-- Barbell Stem -->
  <line x1="84" y1="80" x2="84" y2="432" class="monochrome" stroke-width="24" stroke-linecap="round"/>

  <!-- B Loops -->
  <path d="M 96 170 H 144 C 180 170 204 186 204 226 C 204 262 180 282 144 282 H 96" class="monochrome" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 96 282 H 154 C 194 282 224 300 224 338 C 224 376 194 392 154 392 H 96" class="monochrome" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- W Pulse Line -->
  <path d="M 254 282 L 294 392 L 344 120 L 394 392 L 434 282 L 464 282" stroke="#00C2FF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
</svg>